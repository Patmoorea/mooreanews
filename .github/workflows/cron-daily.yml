# Job quotidien complet MooreaNews (~6h05 Tahiti).
# Chaîne de 7 requêtes HTTP (< 60 s chacune) — toutes les tâches daily, rien supprimé.

name: Cron daily MooreaNews

on:
  schedule:
    # ~6h05 Tahiti (16:05 UTC)
    - cron: "5 16 * * *"
  workflow_dispatch:

concurrency:
  group: cron-daily
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Daily chainé (7 étapes — maintenance → telegram)
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET manquant dans les secrets GitHub du dépôt."
            exit 1
          fi
          BASE="https://www.mooreanews.com"

          run_step() {
            label="$1"
            part="$2"
            optional="${3:-0}"
            url="${BASE}/api/cron/daily?secret=${CRON_SECRET}&wait=1&part=${part}"
            echo ""
            echo "=== ${label} (${part}) ==="
            set +e
            code=$(curl -sS -o /tmp/daily-part.json -w "%{http_code}" --http1.1 --max-time 58 "$url")
            curl_exit=$?
            set -e
            echo "HTTP ${code} (curl exit ${curl_exit})"
            head -c 600 /tmp/daily-part.json || true
            echo ""
            if grep -q '"error":"unauthorized"' /tmp/daily-part.json 2>/dev/null; then
              echo "CRON_SECRET incorrect"
              exit 1
            fi
            if [ "$code" = "200" ]; then
              return 0
            fi
            if [ "$optional" = "1" ]; then
              echo "Avertissement ${label} — suite de la chaîne"
              return 0
            fi
            echo "Échec ${label} (HTTP ${code})"
            exit 1
          }

          run_step "Maintenance" "maintenance"
          run_step "Digests" "digests" "1"
          run_step "Emploi & formation" "employment" "1"
          run_step "Agrégation veille" "aggregate" "1"
          run_step "Services (coupures, garde)" "services" "1"
          run_step "Nettoyage & audit" "cleanup" "1"
          run_step "Rapport Telegram" "telegram" "1"

          echo ""
          echo "Cron daily terminé — 7 étapes exécutées."
