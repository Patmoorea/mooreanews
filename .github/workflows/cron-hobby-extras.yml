# Crons Hobby — météo, push soir (newsletter dimanche → newsletter-sunday.yml).
# Secret : GitHub → Settings → Secrets → CRON_SECRET

name: Crons Hobby extras

on:
  schedule:
    # Vigilance météo après-midi ~15h Tahiti (01:05 UTC)
    - cron: "5 1 * * *"
    # Push soir jeu–dim ~17h Tahiti (03:00 UTC)
    - cron: "0 3 * * 5,6,0,1"

concurrency:
  group: cron-hobby-extras
  cancel-in-progress: false

jobs:
  meteo-afternoon:
    if: github.event.schedule == '5 1 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Vigilance météo (après-midi ~15h Tahiti)
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          curl -fsS --max-time 55 \
            "https://www.mooreanews.com/api/cron/meteo-vigilance?secret=${CRON_SECRET}"

  evening-push:
    if: github.event.schedule == '0 3 * * 5,6,0,1'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Push digest soir (jeu–dim ~17h Tahiti)
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          curl -fsS --max-time 55 \
            "https://www.mooreanews.com/api/cron/evening-push?secret=${CRON_SECRET}"

