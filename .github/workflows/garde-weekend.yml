# Garde Moorea — COPPF (ordre des médecins) + Commune + OCR.
# Tahiti UTC−10 :
# - tous les matins 6h (jours fériés midweek inclus)
# - fenêtre week-end mer→dim
# - 12h le jour même si férié midweek (lun–mar)

name: Garde week-end MooreaNews

on:
  schedule:
    - cron: "0 16 * * *"    # tous les jours 6h Tahiti (fériés midweek inclus)
    - cron: "0 22 * * 1,2"  # lundi/mardi 12h Tahiti (fériés type 1er mai, 14 juil.)
    - cron: "0 22 * * 3"    # mercredi 12h Tahiti
    - cron: "0 16 * * 4"    # jeudi 6h Tahiti (doublon OK avec quotidien)
    - cron: "0 22 * * 4"    # jeudi 12h Tahiti
    - cron: "0 3 * * 5"     # jeudi 17h Tahiti
    - cron: "0 16 * * 5"    # vendredi 6h Tahiti
    - cron: "0 22 * * 5"    # vendredi 12h Tahiti
    - cron: "0 18 * * 6"    # samedi 8h Tahiti
    - cron: "0 16 * * 0"    # dimanche 6h Tahiti
  workflow_dispatch:

concurrency:
  group: garde-weekend
  cancel-in-progress: false

jobs:
  garde:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Sync garde (COPPF + OCR + article)
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET manquant"
            exit 1
          fi
          url="https://www.mooreanews.com/api/cron/garde-weekend?secret=${CRON_SECRET}&force=1&wait=1"
          echo "=== Garde week-end ==="
          code=$(curl -sS -o /tmp/garde.json -w "%{http_code}" --http1.1 --max-time 300 "$url")
          echo "HTTP ${code}"
          head -c 1200 /tmp/garde.json || true
          echo ""
          if [ "$code" != "200" ] && [ "$code" != "202" ]; then
            if grep -q '"found":true' /tmp/garde.json && grep -qE '"doctor":"[^"]+' /tmp/garde.json; then
              echo "Garde trouvée malgré HTTP ${code} — OK"
              exit 0
            fi
            echo "Échec HTTP ${code}"
            exit 1
          fi
          if ! grep -q '"found":true' /tmp/garde.json; then
            echo "Sync HTTP ${code} mais found=false — échec (garde absente)"
            exit 1
          fi
          if ! grep -qE '"doctor":"[^"]+' /tmp/garde.json; then
            echo "Sync OK mais médecin manquant — échec"
            exit 1
          fi
          echo "Garde OK"
          exit 0
