# Veille MooreaNews toutes les heures (alternative à cron-job.org).
# Secret requis : Settings → Secrets → CRON_SECRET (même valeur que Vercel).

name: Veille horaire MooreaNews

on:
  schedule:
    # 5h–20h heure de Tahiti (UTC−10) → 15h–23h et 0h–6h UTC
    - cron: "0 15-23,0-6 * * *"
  workflow_dispatch:

concurrency:
  group: veille-hourly
  cancel-in-progress: false

jobs:
  veille:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Appeler /api/cron/aggregate
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET manquant dans les secrets GitHub du dépôt."
            exit 1
          fi
          url="https://www.mooreanews.com/api/cron/aggregate?secret=${CRON_SECRET}"
          code=$(curl -sS -o /tmp/veille.json -w "%{http_code}" --http1.1 --max-time 420 "$url")
          echo "HTTP ${code}"
          cat /tmp/veille.json | head -c 4000
          echo ""
          if [ "$code" != "200" ]; then
            echo "Échec HTTP ${code}"
            exit 1
          fi
          if grep -q '"error":"unauthorized"' /tmp/veille.json 2>/dev/null; then
            echo "CRON_SECRET incorrect (unauthorized)"
            exit 1
          fi

      - name: Déclencher import Facebook MooreaNews (async)
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          fb_url="https://www.mooreanews.com/api/cron/facebook?secret=${CRON_SECRET}"
          code=$(curl -sS -o /tmp/fb-cron.json -w "%{http_code}" --http1.1 --max-time 30 "$fb_url")
          echo "Facebook cron HTTP ${code}"
          cat /tmp/fb-cron.json | head -c 800
          echo ""
          if [ "$code" != "202" ] && [ "$code" != "200" ]; then
            echo "Avertissement: cron Facebook HTTP ${code} (non bloquant)"
          fi
