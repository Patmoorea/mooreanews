# Veille MooreaNews toutes les heures (alternative à cron-job.org).
# Secret requis : Settings → Secrets → CRON_SECRET (même valeur que Vercel).
#
# Vercel Hobby = max 60 s par invocation → veille en 4 étapes synchrones.

name: Veille horaire MooreaNews

on:
  schedule:
    # 5h–20h heure de Tahiti (UTC−10) → 15h–23h et 0h–6h UTC
    - cron: "0 15-23,0-6 * * *"
  workflow_dispatch:

concurrency:
  group: veille-hourly
  cancel-in-progress: false

jobs:
  veille:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Veille chainée (rss → facebook → web → telegram)
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET manquant dans les secrets GitHub du dépôt."
            exit 1
          fi
          BASE="https://www.mooreanews.com"

          run_step() {
            label="$1"
            endpoint="$2"
            extra="${3:-}"
            url="${BASE}${endpoint}?secret=${CRON_SECRET}&wait=1"
            if [ -n "$extra" ]; then
              url="${url}&${extra}"
            fi
            echo ""
            echo "=== ${label} ==="
            code=$(curl -sS -o /tmp/veille-step.json -w "%{http_code}" --http1.1 --max-time 55 "$url")
            echo "HTTP ${code}"
            head -c 600 /tmp/veille-step.json || true
            echo ""
            if grep -q '"error":"unauthorized"' /tmp/veille-step.json 2>/dev/null; then
              echo "CRON_SECRET incorrect"
              exit 1
            fi
            if [ "$code" != "200" ]; then
              echo "Échec ${label} (HTTP ${code})"
              exit 1
            fi
          }

          run_step "RSS" "/api/cron/aggregate" "part=rss"
          run_step "Facebook" "/api/cron/facebook" "chain=1"
          run_step "Web" "/api/cron/aggregate" "part=web"
          run_step "Finish + Telegram" "/api/cron/aggregate" "part=finish"

          echo ""
          echo "Veille terminée — rapport Telegram envoyé si configuré."
