# Veille MooreaNews toutes les heures (alternative à cron-job.org).
# Secret requis : Settings → Secrets → CRON_SECRET (même valeur que Vercel).

name: Veille horaire MooreaNews

on:
  schedule:
    # 5h–20h heure de Tahiti (UTC−10) → 15h–23h et 0h–6h UTC
    - cron: "0 15-23,0-6 * * *"
  workflow_dispatch:

concurrency:
  group: veille-hourly
  cancel-in-progress: false

jobs:
  veille:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Déclencher veille MooreaNews (async)
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set +e
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET manquant dans les secrets GitHub du dépôt."
            exit 1
          fi
          url="https://www.mooreanews.com/api/cron/aggregate?secret=${CRON_SECRET}"
          code=$(curl -sS -o /tmp/veille.json -w "%{http_code}" --http1.1 --max-time 45 "$url")
          curl_exit=$?
          echo "Veille HTTP ${code} (curl exit ${curl_exit})"
          if [ -f /tmp/veille.json ]; then
            cat /tmp/veille.json | head -c 800
            echo ""
          fi
          if grep -q '"error":"unauthorized"' /tmp/veille.json 2>/dev/null; then
            echo "CRON_SECRET incorrect (unauthorized)"
            exit 1
          fi
          if [ "$curl_exit" -ne 0 ] && [ "$curl_exit" -ne 28 ]; then
            echo "Échec curl (exit ${curl_exit})"
            exit 1
          fi
          if [ "$code" = "202" ] || [ "$code" = "200" ]; then
            echo "Veille déclenchée — traitement en arrière-plan sur Vercel (~2–5 min)."
            exit 0
          fi
          if [ "$code" = "504" ] || [ "$code" = "502" ]; then
            echo "Avertissement: timeout gateway ${code} — relancer ou vérifier Vercel"
            exit 0
          fi
          echo "Échec HTTP ${code}"
          exit 1
